name: Seed Rotation DB (run once)

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Seed rotation entries
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ROTATION_DB_ID: ${{ secrets.ROTATION_DB_ID }}
        run: python scripts/seed_rotation.py
