name: Weekly Planner Bot

on:
  schedule:
    # Every Sunday at 20:00 Israel time (UTC+3 summer = 17:00 UTC)
    - cron: "0 17 * * 0"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # allow up to 30 min for interactive session

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run interactive planner bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          ROTATION_DB_ID:     ${{ secrets.ROTATION_DB_ID }}
        run: python scripts/weekly_planner_bot.py
