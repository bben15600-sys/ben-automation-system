name: Weekly Planner → Notion → Telegram

on:
  schedule:
    # Backup cron (primary trigger is Google Cloud Scheduler via workflow_dispatch)
    - cron: "0 17 * * 0"
  workflow_dispatch:   # triggered by Cloud Function every Sunday 17:00 UTC
    inputs:
      skip_bot:
        description: 'דלג על השאלון — השתמש בתשובות האחרונות'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  weekly-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # 25 min for bot + buffer for rest of steps

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      # ── Step 1: Interactive planner bot (waits for user answers) ──────────
      - name: "1 · שאלון שבועי — טלגרם"
        if: ${{ !inputs.skip_bot }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          ROTATION_DB_ID:     ${{ secrets.ROTATION_DB_ID }}
          WEEKLY_DB_ID:       ${{ secrets.WEEKLY_DB_ID }}
        run: python scripts/weekly_planner_bot.py

      # ── Step 2: Generate individual events in oslife Dashboard ────────────
      - name: "2 · יצירת אירועים ב-Notion"
        env:
          NOTION_TOKEN:    ${{ secrets.NOTION_TOKEN }}
          ROTATION_DB_ID:  ${{ secrets.ROTATION_DB_ID }}
          WEEKLY_DB_ID:    ${{ secrets.WEEKLY_DB_ID }}
        run: python scripts/weekly_scheduler.py

      # ── Step 3: Notify user via Telegram that oslife.app is updated ───────
      - name: "3 · שליחת קישור לאתר בטלגרם"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import os, json, time, urllib.request
          token   = os.environ["TELEGRAM_BOT_TOKEN"].strip().replace(" ", "").replace("\n", "")
          chat_id = os.environ["TELEGRAM_CHAT_ID"].strip().replace(" ", "").replace("\n", "")
          url     = f"https://api.telegram.org/bot{token}/sendMessage"
          ts      = int(time.time())
          site    = f"https://oslife.app/schedule?t={ts}"
          msg = (
            "📅 <b>הלוז שלך לשבוע הבא מוכן!</b>\n\n"
            f"🔗 <a href='{site}'>לחץ כאן לצפייה</a>\n\n"
            "<i>הלוז מתעדכן אוטומטית כל שבוע לפי תשובותיך.</i>"
          )
          payload = json.dumps({
            "chat_id": chat_id,
            "text": msg,
            "parse_mode": "HTML",
            "disable_web_page_preview": False,
          }).encode()
          req = urllib.request.Request(url, data=payload,
                                       headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req)
          print("✅ Telegram link sent")
          EOF
