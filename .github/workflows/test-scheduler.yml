name: Test Scheduler (manual)

# Seeds a sample Plan JSON in the Rotation DB, then runs weekly_scheduler.py
# so individual events land in the "לוז יומי" DB. Safe to re-run — archives
# existing current-week rotation entries before seeding.

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Seed + run scheduler
        env:
          NOTION_TOKEN:   ${{ secrets.NOTION_TOKEN }}
          ROTATION_DB_ID: ${{ secrets.ROTATION_DB_ID }}
          WEEKLY_DB_ID:   ${{ secrets.WEEKLY_DB_ID }}
        working-directory: scripts
        run: python test_run_scheduler.py
