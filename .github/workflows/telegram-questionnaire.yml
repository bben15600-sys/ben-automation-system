name: Send Weekly Questionnaire

on:
  schedule:
    # Every Sunday at 20:00 Israel time (UTC+3 in summer = 17:00 UTC)
    # During winter (UTC+2) change to "0 18 * * 0"
    - cron: "0 17 * * 0"
  workflow_dispatch:

jobs:
  send-questionnaire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Send questionnaire
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_questionnaire.py
