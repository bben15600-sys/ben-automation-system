name: Notion Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Check Notion connection
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ROTATION_DB_ID: ${{ secrets.ROTATION_DB_ID }}
        run: python scripts/notion_debug.py
