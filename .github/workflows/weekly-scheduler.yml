name: Weekly Schedule Generator

on:
  schedule:
    # Every Sunday at 09:00 Israel time (UTC+3 = 06:00 UTC)
    - cron: "0 6 * * 0"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  generate-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly scheduler
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ROTATION_DB_ID: ${{ secrets.ROTATION_DB_ID }}
          WEEKLY_DB_ID: ${{ secrets.WEEKLY_DB_ID }}
        run: python scripts/weekly_scheduler.py

      - name: Generate schedule website
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          WEEKLY_DB_ID: ${{ secrets.WEEKLY_DB_ID }}
        run: python scripts/generate_site.py

      - name: Deploy to GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "Deploy weekly schedule site [skip ci]"
          git push origin master
