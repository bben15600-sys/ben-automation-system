name: Collect Weekly Response

on:
  schedule:
    # 30 minutes after questionnaire (Sunday 20:30 IL = 17:30 UTC summer)
    - cron: "30 17 * * 0"
  workflow_dispatch:

jobs:
  collect-response:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Collect response and write to Rotation DB
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ROTATION_DB_ID: ${{ secrets.ROTATION_DB_ID }}
        run: python scripts/telegram_collect.py
