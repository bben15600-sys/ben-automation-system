name: Deploy Weekly Schedule Site

on:
  # Run after weekly scheduler creates entries (Sunday 06:30 UTC = 09:30 IL)
  schedule:
    - cron: "30 6 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Generate site
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          WEEKLY_DB_ID: ${{ secrets.WEEKLY_DB_ID }}
        run: python scripts/generate_site.py

      - name: Deploy to GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "Deploy weekly schedule site [skip ci]"
          git push origin master
